<!doctype html>
<html lang="da">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Infoskærm – Nørholm</title>
  <style>
    :root{
      --bg:#0f1115;
      --panel:#161a22;
      --text:#e9edf3;
      --muted:#a7b0c0;
      --radius:18px;
      --btn:#232a38;
      --btnHover:#2b3446;
      --btnBorder:rgba(255,255,255,.12);
    }
    *{ box-sizing:border-box; }
    html,body{
      height:100%;
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;
      background:var(--bg);
      color:var(--text);
    }

    .wrap{
      height:100%;
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:14px;
      padding:14px;
    }

    .card{
      background:var(--panel);
      border-radius:var(--radius);
      padding:26px 22px;
      box-shadow: 0 10px 30px rgba(0,0,0,.25);
      min-height:0;
      display:flex;
      flex-direction:column;
    }

    .center{
      flex:1;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      text-align:center;
      gap:14px;
    }

    .headline{
      font-size:52px;
      font-weight:900;
      line-height:1.05;
      margin:0;
      color:var(--text);
    }

    .dateLine{
      font-size:32px;
      font-weight:800;
      margin:0;
      color:var(--text);
      opacity:.95;
    }

    .bigTime{
      font-size:92px;
      font-weight:900;
      line-height:1.02;
      margin:0;
      letter-spacing: .5px;
    }

    .dayPart{
      font-size:38px;
      font-weight:900;
      margin:0;
      opacity:.98;
    }

    .weatherIcon{
      font-size:86px;
      line-height:1;
      margin-top:4px;
    }

    .bigTemp{
      font-size:92px;
      font-weight:900;
      line-height:1.02;
      margin:0;
    }

    .weatherDesc{
      font-size:32px;
      font-weight:900;
      margin:0;
      opacity:.95;
    }

    .rightFooter{
      display:flex;
      justify-content:flex-end;
      margin-top:auto;
      padding-top:10px;
    }
    .updated{
      font-size:16px;
      font-style:italic;
      color:var(--muted);
      opacity:.9;
      white-space:nowrap;
    }

    /* 🔊 Læs op-knap */
    .speakBar{
      display:flex;
      justify-content:center;
      margin-top:18px;
    }
    .speakBtn{
      appearance:none;
      border:1px solid var(--btnBorder);
      background:var(--btn);
      color:var(--text);
      border-radius:14px;
      padding:16px 22px;
      font-size:24px;
      font-weight:900;
      letter-spacing:.2px;
      cursor:pointer;
      display:inline-flex;
      gap:10px;
      align-items:center;
      justify-content:center;
      min-width:240px;
      box-shadow: 0 6px 18px rgba(0,0,0,.22);
      -webkit-tap-highlight-color: transparent;
    }
    .speakBtn:active{ transform: scale(0.99); }
    .speakBtn:hover{ background:var(--btnHover); }
    .speakBtn:focus{ outline: 2px solid rgba(255,255,255,.25); outline-offset: 3px; }

    @media (max-width: 900px){
      .wrap{ grid-template-columns: 1fr; }
      .headline{ font-size:46px; }
      .dateLine, .weatherDesc{ font-size:30px; }
      .bigTime, .bigTemp{ font-size:84px; }
      .weatherIcon{ font-size:78px; }
      .dayPart{ font-size:34px; }
      .speakBtn{ font-size:22px; padding:14px 18px; min-width:220px; }
    }
  </style>
</head>
<body>
  <div class="wrap">

    <!-- VENSTRE: UR -->
    <section class="card" aria-label="Ur">
      <div class="center">
        <h1 class="headline" id="weekdayBig">—</h1>
        <p class="dateLine" id="dateLine">—</p>
        <p class="bigTime" id="timeLine">—:—</p>
        <p class="dayPart" id="dayPartLine">—</p>

        <div class="speakBar">
          <button class="speakBtn" id="speakClockBtn" type="button">
            🔊 Læs op
          </button>
        </div>
      </div>
    </section>

    <!-- HØJRE: VEJR -->
    <section class="card" aria-label="Vejr">
      <div class="center">
        <h1 class="headline" id="placeName">Nørholm</h1>
        <p class="weatherDesc" id="weatherSummary">Henter vejr…</p>
        <div class="weatherIcon" id="weatherIcon">⛅</div>
        <p class="bigTemp" id="tempLine">—°</p>

        <div class="speakBar">
          <button class="speakBtn" id="speakWeatherBtn" type="button">
            🔊 Læs op
          </button>
        </div>
      </div>

      <div class="rightFooter">
        <div class="updated" id="updatedLine">Sidst opdateret: —</div>
      </div>
    </section>

  </div>

<script>
  const LAT = 57.037145;
  const LON = 9.737577;

  const dkWeekdays = ["Søndag","Mandag","Tirsdag","Onsdag","Torsdag","Fredag","Lørdag"];
  const dkMonths = ["januar","februar","marts","april","maj","juni","juli","august","september","oktober","november","december"];

  function dayPart(h){
    if (h >= 5 && h < 9)  return "Morgen";
    if (h >= 9 && h < 12) return "Formiddag";
    if (h >= 12 && h < 17) return "Eftermiddag";
    if (h >= 17 && h < 22) return "Aften";
    return "Nat";
  }
  function pad2(n){ return String(n).padStart(2,"0"); }

  function tickClock(){
    const now = new Date();
    document.getElementById("weekdayBig").textContent = dkWeekdays[now.getDay()];
    document.getElementById("dateLine").textContent = `${now.getDate()}. ${dkMonths[now.getMonth()]} ${now.getFullYear()}`;
    document.getElementById("timeLine").textContent = `${pad2(now.getHours())}:${pad2(now.getMinutes())}`;
    document.getElementById("dayPartLine").textContent = dayPart(now.getHours());
  }
  tickClock();
  setInterval(tickClock, 1000);

  const weatherCodeMap = {
    0:["Klart","☀️"],1:["Mest klart","🌤️"],2:["Let skyet","⛅"],3:["Overskyet","☁️"],
    45:["Tåge","🌫️"],48:["Tåge","🌫️"],51:["Støvregn","🌦️"],53:["Støvregn","🌦️"],
    55:["Støvregn","🌧️"],61:["Regn","🌧️"],63:["Regn","🌧️"],65:["Kraftig regn","🌧️"],
    71:["Sne","🌨️"],73:["Sne","🌨️"],75:["Kraftig sne","🌨️"],
    80:["Byger","🌦️"],81:["Byger","🌦️"],82:["Kraftige byger","⛈️"],
    95:["Torden","⛈️"],96:["Torden + hagl","⛈️"],99:["Torden + hagl","⛈️"]
  };

  async function fetchWeather(){
    const url =
      `https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}` +
      `&current=temperature_2m,weather_code&timezone=Europe%2FCopenhagen`;

    try{
      const r = await fetch(url,{cache:"no-store"});
      const data = await r.json();
      const c = data.current;

      const [desc,icon] = weatherCodeMap[c.weather_code] || ["Vejr","⛅"];
      document.getElementById("weatherSummary").textContent = desc;
      document.getElementById("weatherIcon").textContent = icon;
      document.getElementById("tempLine").textContent = `${Math.round(c.temperature_2m)}°`;
      document.getElementById("updatedLine").textContent =
        `Sidst opdateret: ${new Date().toLocaleTimeString("da-DK",{hour:"2-digit",minute:"2-digit"})}`;
    }catch{
      document.getElementById("weatherSummary").textContent = "Kunne ikke hente vejr";
      document.getElementById("weatherIcon").textContent = "⚠️";
    }
  }

  fetchWeather();
  setInterval(fetchWeather,15*60*1000);

  // 🔊 TALE
  function speak(text){
    if(!("speechSynthesis" in window)) return;
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang="da-DK";
    speechSynthesis.speak(u);
  }

  function speakClock(){
    const weekday=document.getElementById("weekdayBig").textContent;
    const date=document.getElementById("dateLine").textContent;
    const time=document.getElementById("timeLine").textContent;
    const part=document.getElementById("dayPartLine").textContent;
    speak(`${weekday}. Dato ${date}. Klokken er ${time}. Det er ${part}.`);
  }

  function speakWeather(){
    const place=document.getElementById("placeName").textContent;
    const desc=document.getElementById("weatherSummary").textContent;
    const temp=document.getElementById("tempLine").textContent.replace("°","");
    speak(`I ${place} er der lige nu ${desc.toLowerCase()} og temperaturen er ${temp} grader.`);
  }

  document.getElementById("speakClockBtn").addEventListener("click",speakClock);
  document.getElementById("speakWeatherBtn").addEventListener("click",speakWeather);
</script>
</body>
</html>
